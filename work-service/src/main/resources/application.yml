server:
  port: 8182
  servlet:
    context-path: /app
spring:
  main:
    banner-mode: off
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/postgres?options=--search_path%3Dwork_time_project
    username: postgres
    password: 5397

  jpa:
    show-sql: false
    open-in-view: false
    hibernate:
      ddl-auto: validate

  jackson:
    default-property-inclusion: non_absent
integration:
  calendar-service:
    enable: true
  rate-service:
    enable: true
  information-service:
    enable: true
  task-service:
    enable: true
  user-service:
    enable: true
  work-time-service:
    enable: true
